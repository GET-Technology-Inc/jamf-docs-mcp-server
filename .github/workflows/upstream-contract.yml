name: Upstream Contract Check

# Detects when Jamf's learn.jamf.com API drifts from the shape our code depends on
# (metadata fields, product labels, clustering, content format). The data-contracts
# integration suite hits the REAL API; if it fails on a schedule it means upstream
# changed — the same class of change that silently broke non-Pro search/ingestion.
#
# This runs OUT OF BAND (cron) and opens an issue on drift. It is deliberately NOT
# part of the merge gate — live-API flakiness must never block PRs.

on:
  schedule:
    - cron: '0 6 * * MON' # Mondays 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  contract:
    name: Live API contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Retry to absorb transient network/rate-limit blips — a genuine contract
      # break fails all attempts, a flake usually passes on retry.
      - name: Run live API contract tests
        id: contract
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 30
          command: npx vitest run test/integration/data-contracts.test.ts

      - name: Open issue on upstream drift
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Upstream contract drift detected (learn.jamf.com)';
            const body = [
              'The scheduled **Upstream Contract Check** failed, which means the live',
              'Jamf API (`learn.jamf.com`) no longer matches a shape our code depends on',
              '(a metadata field, product label, clustering axis, or content format).',
              '',
              'This is the same class of change that previously broke non-Pro search and',
              'ingestion. Investigate before it degrades production silently.',
              '',
              `- Failed run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '- Start from the failing assertions in `test/integration/data-contracts.test.ts`.',
              '- Remember the downstream consumers: `jamf-docs-mcp-worker` (ingestion) and',
              '  `jamf-docs-chatbot` (via RPC).',
            ].join('\n');

            const { owner, repo } = context.repo;
            const existing = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'upstream-drift', per_page: 1,
            });
            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: existing.data[0].number,
                body: `Contract check failed again on ${new Date().toISOString().slice(0, 10)} — see run ${context.runId}.`,
              });
            } else {
              await github.rest.issues.create({ owner, repo, title, body, labels: ['upstream-drift'] });
            }
