name: Stale Issues & PRs

on:
  schedule:
    - cron: '0 9 * * 1' # every Monday 9:00 UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Close Stale Issues & PRs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          stale-issue-message: >
            This issue has been inactive for 30 days and is now marked as stale.
            It will be closed in 30 days if there is no further activity.
          close-issue-message: >
            Closed due to inactivity. Feel free to reopen if this is still relevant.
          stale-pr-message: >
            This PR has been inactive for 30 days and is now marked as stale.
            It will be closed in 14 days if there is no further activity.
          close-pr-message: >
            Closed due to inactivity. Feel free to reopen if this is still relevant.
          days-before-stale: 30
          days-before-close: 30
          days-before-pr-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: 'pinned,security,bug'
          exempt-pr-labels: 'pinned,security'
