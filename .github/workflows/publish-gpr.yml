name: Publish to GitHub Packages

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  publish-gpr:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22.x'
          cache: 'npm'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@${{ github.repository_owner }}'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to GitHub Packages
        run: |
          # github.repository_owner is mixed-case (e.g. GET-Technology-Inc), but npm
          # normalises package scopes to lowercase when resolving the registry. The
          # mixed-case scope therefore failed to match the .npmrc registry mapping,
          # so `npm publish` fell back to registry.npmjs.org and failed with
          # ENEEDAUTH. Lowercase the scope and force the GitHub Packages registry.
          owner_lc="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          npm pkg set name="@${owner_lc}/jamf-docs-mcp-server"
          npm publish --registry=https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
