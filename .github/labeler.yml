tools:
  - changed-files:
      - any-glob-to-any-file: 'src/tools/**'

services:
  - changed-files:
      - any-glob-to-any-file: 'src/services/**'

schemas:
  - changed-files:
      - any-glob-to-any-file: 'src/schemas/**'

prompts:
  - changed-files:
      - any-glob-to-any-file: 'src/prompts/**'

transport:
  - changed-files:
      - any-glob-to-any-file: 'src/transport/**'

utils:
  - changed-files:
      - any-glob-to-any-file: 'src/utils/**'

core:
